<section class="blog-section" aria-label="Blog Section">
  <div class="blog-section__inner">
    <div class="blog-section__top">
      <div class="blog-section__heading">
        <div class="blog-section__subtitle">Our Journal</div>
        <div class="blog-section__title">
          <span class="blog-section__title-text">Latest </span>
          <span class="blog-section__title-accent">Insights</span>
          <span class="blog-section__title-text"> & Living </span>
          <span class="blog-section__title-accent">Trends</span>
        </div>
        <p class="blog-section__description">
          Stay updated with the latest news, tips, and trends in the world of modern hospitality.
        </p>
      </div>

      <a href="#" class="blog-section__explore-link">
        <span class="blog-section__explore-text">Explore Journal</span>
        <svg class="blog-section__explore-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M6.75 13.5L11.25 9L6.75 4.5" stroke="var(--atnest-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <div class="blog-section__grid">
      <article class="blog-card" *ngFor="let post of blogPosts">
        <div class="blog-card__image-container">
          <img class="blog-card__image" [src]="post.imageSrc" [alt]="post.title" />
          <div class="blog-card__category">{{ post.category }}</div>
        </div>

        <div class="blog-card__content">
          <div class="blog-card__meta">
            <div class="blog-card__date">
              <svg class="blog-card__date-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <g clip-path="url(#clip0_478_4118)">
              <path d="M4.66602 1.16602V3.49935" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9.33398 1.16602V3.49935" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11.0833 2.33301H2.91667C2.27233 2.33301 1.75 2.85534 1.75 3.49967V11.6663C1.75 12.3107 2.27233 12.833 2.85534 12.833H11.0833C11.7277 12.833 12.25 12.3107 12.25 11.6663V3.49967C12.25 2.85534 11.7277 2.33301 11.0833 2.33301Z" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1.75 5.83301H12.25" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <defs>
              <clipPath id="clip0_478_4118">
                <rect width="14" height="14" fill="white"/>
              </clipPath>
            </defs>
          </svg>
              <span class="blog-card__date-text">{{ post.date }}</span>
            </div>
            <div class="blog-card__author">
              <svg class="blog-card__author-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M11.0827 12.25V11.0833C11.0827 10.4645 10.8368 9.871 10.3993 9.43342C9.96168 8.99583 9.36819 8.75 8.74935 8.75H5.24935C4.63051 8.75 4.03702 8.99583 3.59943 9.43342C3.16185 9.871 2.91602 10.4645 2.91602 11.0833V12.25" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M6.99935 6.41667C8.28801 6.41667 9.33268 5.372 9.33268 4.08333C9.33268 2.79467 8.28801 1.75 6.99935 1.75C5.71068 1.75 4.66602 2.79467 4.66602 4.08333C4.66602 5.372 5.71068 6.41667 6.99935 6.41667Z" stroke="#A0A0A0" stroke-width="1.16667" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="blog-card__author-name">{{ post.author }}</span>
            </div>
          </div>

          <h3 class="blog-card__title">{{ post.title }}</h3>
          
          <p class="blog-card__description">{{ post.description }}</p>

          <a href="#" class="blog-card__read-more">
            <span class="blog-card__read-more-text">Read Article</span>
            <svg class="blog-card__read-more-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3.33398 8H12.6673" stroke="#1A1A1A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 3.33301L12.6667 7.99967L8 12.6663" stroke="#1A1A1A" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </article>
    </div>
  </div>
</section>
