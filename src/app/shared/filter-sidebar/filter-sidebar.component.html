<aside class="filter-sidebar" data-name="Properties">
  <!-- Filter Header -->
  <div class="filter-sidebar__header">
    <div class="filter-sidebar__title">
      <svg class="filter-sidebar__title-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M8.33238 16.6667C8.33231 16.8215 8.37539 16.9733 8.45679 17.1051C8.53819 17.2368 8.65469 17.3433 8.79322 17.4125L10.4599 18.2458C10.587 18.3093 10.7282 18.3393 10.8701 18.3329C11.012 18.3264 11.1499 18.2838 11.2707 18.2091C11.3916 18.1344 11.4913 18.03 11.5604 17.9059C11.6295 17.7818 11.6658 17.6421 11.6657 17.5V11.6667C11.6659 11.2537 11.8194 10.8554 12.0965 10.5492L18.1157 3.89167C18.2236 3.77213 18.2945 3.6239 18.32 3.4649C18.3454 3.3059 18.3242 3.14294 18.259 2.99573C18.1937 2.84851 18.0872 2.72335 17.9524 2.63538C17.8175 2.5474 17.6601 2.50038 17.499 2.5H2.49905C2.33789 2.50006 2.1802 2.54685 2.04509 2.6347C1.90998 2.72255 1.80324 2.84769 1.7378 2.99497C1.67237 3.14225 1.65104 3.30534 1.6764 3.46449C1.70177 3.62364 1.77274 3.77203 1.88072 3.89167L7.90155 10.5492C8.17866 10.8554 8.33219 11.2537 8.33238 11.6667V16.6667Z" stroke="var(--atnest-primary)" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h3 class="filter-sidebar__title-text">Filters</h3>
    </div>
    <button type="button" class="filter-sidebar__reset" (click)="resetAllFilters()">Reset All</button>
  </div>

  <!-- Price Range Filter -->
  <div class="filter-sidebar__section">
    <h4 class="filter-sidebar__section-title">Price Range (Monthly)</h4>
    
    <!-- Price Range Slider Container -->
    <div class="price-range__slider-container">
      <!-- Track -->
      <div class="price-range__track">
        <!-- Track Fill -->
        <div 
          class="price-range__track-fill" 
          [style.width.px]="trackFillWidth"
          [style.left.px]="trackFillLeft"
        ></div>
      </div>
      
      <!-- Min Slider Handle -->
      <div 
        class="price-range__slider-handle price-range__slider-handle--min"
        [style.left.px]="minSliderPixelPosition"
        (mousedown)="onMinSliderDrag($event)"
        (touchstart)="onMinSliderTouch($event)"
      ></div>
      
      <!-- Max Slider Handle -->
      <div 
        class="price-range__slider-handle price-range__slider-handle--max"
        [style.left.px]="maxSliderPixelPosition"
        (mousedown)="onMaxSliderDrag($event)"
        (touchstart)="onMaxSliderTouch($event)"
      ></div>
    </div>

    <!-- Price Input Fields -->
    <div class="price-range__inputs">
      <div class="price-range__input-group">
        <label class="price-range__label">Min</label>
        <div class="price-range__input-wrapper">
          <span class="price-range__value">{{ formatPrice(currentMin) }}</span>
        </div>
      </div>
      <div class="price-range__input-group">
        <label class="price-range__label">Max</label>
        <div class="price-range__input-wrapper">
          <span class="price-range__value">{{ formatPrice(currentMax) }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Preferred Locations Filter -->
  <div class="filter-sidebar__section">
    <h4 class="filter-sidebar__section-title">Preferred Locations</h4>
    <div class="filter-options">
      <div class="filter-option" *ngFor="let location of locations">
        <label class="filter-option__label">
          <input 
            type="checkbox" 
            class="filter-option__checkbox"
            [checked]="selectedLocations.has(location)"
            (change)="onLocationChange(location, $any($event.target).checked)"
          >
          <span class="filter-option__checkmark" [class.filter-option__checkmark--checked]="selectedLocations.has(location)">
            <svg class="filter-option__check-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M11.6663 3.5L5.24967 9.91667L2.33301 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="filter-option__text">{{ location }}</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Property Type Filter -->
  <div class="filter-sidebar__section">
    <h4 class="filter-sidebar__section-title">Property Type</h4>
    <div class="filter-options">
      <div class="filter-option" *ngFor="let type of propertyTypes">
        <label class="filter-option__label">
          <input 
            type="checkbox" 
            class="filter-option__checkbox"
            [checked]="selectedPropertyTypes.has(type)"
            (change)="onPropertyTypeChange(type, $any($event.target).checked)"
          >
          <span class="filter-option__checkmark" [class.filter-option__checkmark--checked]="selectedPropertyTypes.has(type)">
            <svg class="filter-option__check-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M11.6663 3.5L5.24967 9.91667L2.33301 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="filter-option__text">{{ type }}</span>
        </label>
      </div>
    </div>
  </div>
</aside>
