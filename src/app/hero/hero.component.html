<div class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-search-module" aria-label="Search">
        <div class="hero-search-module-backplate" aria-hidden="true"></div>
        <div class="hero-search-module-tabs">
          <app-hero-tabs [tabs]="tabs" [activeTab]="activeTab()" (tabChange)="activeTab.set($event)" />
        </div>
        <div class="hero-search-module-fields">
          <app-hero-search [cities]="cities" />
        </div>
      </div>

      <div class="hero-category-pill"><span class="hero-category-pill-bullet" aria-hidden="true"></span>Hotels</div>

      <h1 class="hero-heading">
        Premium
        <span class="hero-heading-highlight">Budget</span>
        <span class="hero-heading-highlight">Luxury</span>
        Hotels
      </h1>

      <p class="hero-description">
        Discover comfortable stays in the heart of the city with top‑notch hospitality and modern conveniences.
      </p>

      <app-hero-amenities [amenities]="amenities" />

      <app-hero-price-rating
        [pricePerDay]="pricePerDay"
        [rating]="rating"
        [ratingCaption]="ratingCaption"
        [avatarCount]="avatarCount"
      />
    </div>

    <div class="hero-right">
      <div class="hero-right-inner">
        <app-hero-gallery />
      </div>
    </div>
  </div>
</div>
